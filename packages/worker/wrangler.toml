name = "omnidrive-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = [ "nodejs_compat_v2" ]

[triggers]
crons = ["*/30 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "omnidrive"
database_id = "dc1bd6bf-f0bd-4ea0-a0d2-05b0f5117559"

[[kv_namespaces]]
binding = "KV"
id = "36b29bf899db4a04994afd4b693c9551"

[vars]
FRONTEND_URL = "https://omnidrive-web.pages.dev"
WORKER_URL = "https://omnidrive-api.dimzsky.workers.dev"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
